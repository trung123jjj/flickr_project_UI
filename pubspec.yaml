name: flickr_project
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.0
  font_awesome_flutter: ^10.7.0
  http: ^1.2.0
  cached_network_image: ^3.3.0
  sqflite: ^2.4.1
  path: ^1.9.0
  flutter_dotenv: ^5.2.0
  image_picker: ^1.0.4
  permission_handler: ^11.3.1
  provider: ^6.1.5+1
